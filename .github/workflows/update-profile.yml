name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "23 14 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update generated README section
        run: node scripts/update-profile.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          if git diff --quiet README.md generated/overview.svg generated/languages.svg; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md generated/overview.svg generated/languages.svg
          git commit -m "Update profile pulse"
          git push
